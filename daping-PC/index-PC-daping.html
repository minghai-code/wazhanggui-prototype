<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>袜业大脑 - 领导驾驶舱</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#050810;overflow:hidden;color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
iframe{border:none;width:100%;height:100%}

/* 科技感网格背景 */
.grid-bg{background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px}

/* 导航按钮 */
.nav-btn{padding:6px 14px;font-size:13px;color:#6a7c95;border-radius:4px;cursor:pointer;transition:all .2s;position:relative;white-space:nowrap}
.nav-btn:hover{color:#00d4ff}
.nav-btn.active{color:#00d4ff;background:rgba(0,212,255,.1);text-shadow:0 0 8px rgba(0,212,255,.6)}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,transparent)}
.nav-btn.disabled{color:#3a4a60;cursor:default}
.nav-btn.disabled:hover{color:#3a4a60}

/* 顶部标题发光 */
.title-glow{text-shadow:0 0 20px rgba(0,212,255,.5),0 0 40px rgba(0,212,255,.3)}

/* 时间显示 */
.time-display{font-family:'Courier New',monospace;font-size:13px;color:#00d4ff;letter-spacing:1px}

/* 扫描线动画 */
@keyframes scan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
.scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.4),transparent);animation:scan 8s linear infinite;pointer-events:none;z-index:1000}
</style>
</head>
<body class="grid-bg">

<!-- 扫描线动效 -->
<div class="scan-line"></div>

<!-- ===== 顶部导航栏 ===== -->
<header class="relative flex items-center justify-between px-6" style="height:64px;background:linear-gradient(180deg,rgba(10,20,40,.95),rgba(10,20,40,.7));border-bottom:1px solid rgba(0,212,255,.15);z-index:100">
  
  <!-- 左侧：Logo + 标题 -->
  <div class="flex items-center gap-3">
    <a href="../index.html" class="nav-btn" style="color:#FF6B35"><i class="fas fa-arrow-left text-[11px] mr-1"></i>总门户</a>
    <div class="w-px h-6 bg-white/10"></div>
    <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#00d4ff,#0066ff);box-shadow:0 0 16px rgba(0,212,255,.4)">
      <i class="fas fa-brain text-white text-sm"></i>
    </div>
    <div>
      <h1 class="text-[18px] font-bold title-glow tracking-wider">袜业大脑</h1>
      <p class="text-[9px] text-cyan-400/60 tracking-widest">DATANG HOSIERY BRAIN · LEADERSHIP COCKPIT</p>
    </div>
  </div>

  <!-- 中间：导航 -->
  <nav class="flex items-center gap-1">
    <div class="nav-btn active" data-page="overview.html">综合态势</div>
    <div class="nav-btn" data-page="flow-people.html">人流看板</div>
    <div class="nav-btn" data-page="flow-logistics.html">物流看板</div>
    <div class="nav-btn" data-page="flow-capital.html">资金流</div>
    <div class="nav-btn" data-page="flow-info.html">信息流</div>
    <div class="nav-btn" data-page="market-ops.html">市场运营</div>
    <div class="nav-btn disabled">物联态势</div>
    <div class="nav-btn disabled">工厂示范</div>
    <div class="nav-btn" data-page="industry-map.html">产业地图</div>
    <div class="nav-btn" data-page="index-center.html">指数中心</div>
    <div class="nav-btn" data-page="risk-alert.html">风险预警</div>
    <div class="nav-btn" data-page="ai-query.html">智能问数</div>
    <div class="nav-btn" data-page="reception.html">接待模式</div>
  </nav>

  <!-- 右侧：时间 + 状态 -->
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-1.5">
      <span class="w-2 h-2 rounded-full bg-green-400" style="box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite"></span>
      <span class="text-[11px] text-green-400/80">数据正常</span>
    </div>
    <div class="time-display" id="datetime">2026-07-12 16:45:30</div>
    <div class="flex items-center gap-1 text-[11px] text-cyan-400/60">
      <i class="fas fa-temperature-half text-[10px]"></i><span>28°C</span>
      <i class="fas fa-cloud text-[10px] ml-1"></i><span>多云</span>
    </div>
  </div>
</header>

<!-- ===== 内容区 ===== -->
<iframe id="screen-frame" src="overview.html" style="height:calc(100vh - 64px)"></iframe>

<style>
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>

<script>
// 时间更新
function updateTime(){
  var d=new Date();
  var p=function(n){return n<10?'0'+n:n};
  document.getElementById('datetime').textContent=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
updateTime();setInterval(updateTime,1000);

// 导航切换
document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    document.getElementById('screen-frame').src=this.getAttribute('data-page');
  });
});
</script>
</body>
</html>
