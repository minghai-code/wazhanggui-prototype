<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>发货 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#2563EB','primary-d':'#1D4ED8','primary-l':'#3B82F6'}}}}
</script>
<style>
:root{--p:#2563EB;--bg:#F0F6FF}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
.num{font-variant-numeric:tabular-nums}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.method-card{transition:all .16s ease}
.method-card.active{border-color:#2563EB;background:#EFF6FF}
.method-card.active .method-radio{background:#2563EB;border-color:#2563EB}
.method-radio{width:18px;height:18px;border:2px solid #d1d5db;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.method-card.active .method-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="relative px-4 pt-2 pb-5 overflow-hidden" style="background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#60A5FA"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#06B6D4"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#8B5CF6"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center justify-between mt-1">
    <a href="order-detail.html" class="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-chevron-left text-sm"></i></a>
    <h1 class="text-white font-extrabold text-[20px]" style="text-shadow:0 2px 10px rgba(0,0,0,.18)">发货</h1>
    <div class="w-9"></div>
  </div>
  <p class="relative text-white/80 text-[11px] mt-2"><i class="fas fa-truck-fast"></i> 发货操作 · 扫码填单号</p>
</div>

<!-- 订单概要 -->
<div class="px-3 mt-3 mb-3">
  <div class="bg-white rounded-2xl shadow-soft p-3 flex items-center gap-2.5">
    <div class="w-12 h-12 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-socks text-primary"></i></div>
    <div class="flex-1 min-w-0">
      <p class="text-[12px] font-medium text-gray-800 line-clamp-1">精梳棉商务男袜 10双装</p>
      <p class="text-[10px] text-gray-400 num">SO20260720-001 · x100双 · ¥340</p>
    </div>
  </div>
</div>

<!-- 物流方式选择 -->
<div class="px-3 mb-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">选择物流方式</p>
  <div class="space-y-2">
    <label class="method-card active flex items-center gap-3 bg-white border-2 border-transparent rounded-2xl p-3.5 shadow-soft">
      <div class="method-radio"></div>
      <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-truck-fast text-primary"></i></div>
      <div class="flex-1"><p class="text-[13px] font-semibold text-gray-800">快递物流</p><p class="text-[10px] text-gray-400 mt-0.5">顺丰/中通/圆通等，适合小件</p></div>
      <span class="text-[10px] text-primary font-bold">推荐</span>
    </label>
    <label class="method-card flex items-center gap-3 bg-white border-2 border-transparent rounded-2xl p-3.5 shadow-soft">
      <div class="method-radio"></div>
      <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-truck text-amber-500"></i></div>
      <div class="flex-1"><p class="text-[13px] font-semibold text-gray-800">物流专线</p><p class="text-[10px] text-gray-400 mt-0.5">零担/整车，适合大件大批量</p></div>
    </label>
    <label class="method-card flex items-center gap-3 bg-white border-2 border-transparent rounded-2xl p-3.5 shadow-soft">
      <div class="method-radio"></div>
      <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-people-carry-box text-emerald-500"></i></div>
      <div class="flex-1"><p class="text-[13px] font-semibold text-gray-800">买家自提</p><p class="text-[10px] text-gray-400 mt-0.5">买家到店/到市场自提</p></div>
    </label>
  </div>
</div>

<!-- 快递公司选择 -->
<div class="px-3 mb-3">
  <div class="bg-white rounded-2xl shadow-soft">
    <a href="#" class="flex items-center gap-3 px-3.5 py-3.5">
      <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-building text-primary text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800">快递公司</span>
      <span class="text-[12px] text-gray-400">顺丰速运</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
  </div>
</div>

<!-- 物流单号 -->
<div class="px-3 mb-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">物流单号 <span class="text-red-500">*</span></p>
  <div class="bg-white rounded-2xl shadow-soft p-3.5">
    <div class="flex items-center gap-2">
      <input type="text" placeholder="请输入或扫码物流单号" class="flex-1 text-[13px] bg-gray-50 rounded-lg px-3 py-2.5 outline-none num" value="">
      <button class="w-10 h-10 rounded-lg flex items-center justify-center text-white flex-shrink-0" style="background:linear-gradient(135deg,#3B82F6,#2563EB)"><i class="fas fa-qrcode text-sm"></i></button>
    </div>
    <p class="text-[10px] text-gray-400 mt-2"><i class="fas fa-circle-info"></i> 点击扫码图标，扫描快递条码自动填充单号</p>
  </div>
</div>

<!-- 发货备注 -->
<div class="px-3 mb-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">发货备注 <span class="text-gray-400 text-[10px] font-normal">（选填）</span></p>
  <div class="bg-white rounded-2xl shadow-soft p-3.5">
    <textarea placeholder="如：已加急处理，请买家注意查收" class="w-full text-[12px] bg-transparent outline-none resize-none" rows="2"></textarea>
  </div>
</div>

<!-- 收货信息确认 -->
<div class="px-3 mb-3">
  <div class="bg-white rounded-2xl shadow-soft p-3.5">
    <div class="flex items-center gap-2 mb-2"><i class="fas fa-location-dot text-primary text-xs"></i><span class="text-[12px] font-bold text-gray-800">收货信息</span></div>
    <p class="text-[12px] text-gray-700">张经理 138****8000</p>
    <p class="text-[11px] text-gray-400 mt-0.5 leading-relaxed">浙江省杭州市余杭区仓前街道海创科技中心3栋8楼</p>
  </div>
</div>

<div style="height:80px"></div>

<!-- 底部确认发货 -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-3 py-2.5" style="z-index:100;width:393px;padding-bottom:18px">
  <button class="w-full py-3 rounded-xl text-white text-[14px] font-bold" style="background:linear-gradient(135deg,#3B82F6,#2563EB)"><i class="fas fa-paper-plane text-[12px]"></i> 确认发货</button>
</div>

</body>
</html>
