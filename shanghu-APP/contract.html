<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>合同服务 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#6366F1','primary-d':'#4F46E5','primary-l':'#818CF8'}}}}
</script>
<style>
:root{--p:#6366F1;--bg:#EEF2FF}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
.num{font-variant-numeric:tabular-nums}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{transition:transform .16s ease}
.card:active{transform:scale(.98)}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="relative px-4 pt-2 pb-5 overflow-hidden" style="background:linear-gradient(135deg,#6366F1 0%,#4F46E5 50%,#4338CA 100%)">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#A5B4FC"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#818CF8"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#6366F1"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center justify-between mt-1">
    <a href="mine.html" class="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-chevron-left text-sm"></i></a>
    <h1 class="text-white font-extrabold text-[20px]" style="text-shadow:0 2px 10px rgba(0,0,0,.18)">合同服务</h1>
    <div class="w-9"></div>
  </div>
  <p class="relative text-white/80 text-[11px] mt-2"><i class="fas fa-file-contract"></i> 合同查看 · 续租退租</p>
  <div class="relative flex gap-5 mt-3 text-[13px]">
    <a class="text-white font-bold border-b-2 border-white pb-1.5">生效中</a>
    <a class="text-white/70 pb-1.5">已到期</a>
    <a class="text-white/70 pb-1.5">全部</a>
  </div>
</div>

<!-- 到期提醒 -->
<div class="px-3 mt-2">
  <div class="bg-amber-50 border border-amber-100 rounded-2xl p-3.5 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white flex-shrink-0" style="background:linear-gradient(135deg,#F59E0B,#D97706)"><i class="fas fa-clock"></i></div>
    <div class="flex-1"><p class="text-[12px] font-bold text-amber-700">租赁合同即将到期</p><p class="text-[10px] text-amber-600 mt-0.5">剩余 <span class="font-bold num">68</span> 天，可提前申请续租</p></div>
    <a href="#" class="text-[11px] text-amber-700 font-bold">续租 ›</a>
  </div>
</div>

<!-- 合同列表 -->
<div class="px-3 mt-3 mb-6">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">我的合同</p>
  <div class="space-y-2.5">

    <!-- 当前合同 -->
    <div class="card bg-white rounded-2xl shadow-soft overflow-hidden">
      <div class="px-3.5 py-3">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-lg bg-indigo-50 flex items-center justify-center"><i class="fas fa-file-contract text-indigo-500 text-sm"></i></div>
            <div><p class="text-[13px] font-bold text-gray-800">商铺租赁合同</p><p class="text-[10px] text-gray-400 num">HT2024-0826</p></div>
          </div>
          <span class="bg-emerald-100 text-emerald-600 text-[9px] font-bold px-1.5 py-0.5 rounded">生效中</span>
        </div>
        <div class="grid grid-cols-2 gap-2 bg-gray-50 rounded-lg p-2.5 text-[10px]">
          <div><span class="text-gray-400">商铺</span><p class="text-gray-700 font-medium mt-0.5">1F-A08 · 50㎡</p></div>
          <div><span class="text-gray-400">租金</span><p class="text-gray-700 font-medium num mt-0.5">¥12,800/月</p></div>
          <div><span class="text-gray-400">租期</span><p class="text-gray-700 font-medium num mt-0.5">2024.09.01-2026.09.01</p></div>
          <div><span class="text-gray-400">剩余</span><p class="text-amber-600 font-bold num mt-0.5">68天</p></div>
        </div>
        <div class="flex gap-2 mt-2.5">
          <a href="#" class="flex-1 py-2 rounded-lg border border-gray-200 text-[11px] text-gray-600 text-center"><i class="fas fa-file-pdf text-[9px]"></i> 预览合同</a>
          <a href="#" class="flex-1 py-2 rounded-lg text-white text-[11px] font-medium text-center" style="background:linear-gradient(135deg,#6366F1,#4F46E5)">续租申请</a>
          <a href="#" class="flex-1 py-2 rounded-lg border border-gray-200 text-[11px] text-gray-600 text-center">退租</a>
        </div>
      </div>
    </div>

    <!-- 历史合同 -->
    <div class="card bg-white rounded-2xl shadow-soft overflow-hidden opacity-75">
      <div class="px-3.5 py-3">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center"><i class="fas fa-file-contract text-gray-400 text-sm"></i></div>
            <div><p class="text-[13px] font-bold text-gray-600">商铺租赁合同</p><p class="text-[10px] text-gray-400 num">HT2023-0518</p></div>
          </div>
          <span class="bg-gray-100 text-gray-500 text-[9px] font-bold px-1.5 py-0.5 rounded">已到期</span>
        </div>
        <div class="flex items-center justify-between text-[10px] text-gray-400">
          <span class="num">2023.09.01-2024.09.01</span>
          <a href="#" class="text-gray-500">查看 ›</a>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
