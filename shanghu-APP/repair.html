<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>报修工单 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#F59E0B','primary-d':'#D97706','primary-l':'#FBBF24'}}}}
</script>
<style>
:root{--p:#F59E0B;--bg:#FFFBEB}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
.num{font-variant-numeric:tabular-nums}
.card{transition:transform .16s ease}
.card:active{transform:scale(.98)}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.urgent-card.active{border-color:#EF4444;background:#FEF2F2}
.urgent-card.active .urgent-radio{background:#EF4444;border-color:#EF4444}
.urgent-radio{width:16px;height:16px;border:2px solid #d1d5db;border-radius:50%}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="relative px-4 pt-2 pb-5 overflow-hidden" style="background:linear-gradient(135deg,#F59E0B 0%,#D97706 50%,#B45309 100%)">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#FCD34D"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#FBBF24"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#F59E0B"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center justify-between mt-1">
    <a href="mine.html" class="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-chevron-left text-sm"></i></a>
    <h1 class="text-white font-extrabold text-[20px]" style="text-shadow:0 2px 10px rgba(0,0,0,.18)">报修工单</h1>
    <a href="#" class="text-white text-[12px]">我的工单</a>
  </div>
  <p class="relative text-white/80 text-[11px] mt-2"><i class="fas fa-screwdriver-wrench"></i> 拍照报修 · 进度跟踪</p>
</div>

<!-- 提交报修 -->
<div class="px-3 mt-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1"><i class="fas fa-paper-plane text-primary text-xs"></i> 提交报修</p>
  <div class="bg-white rounded-2xl shadow-soft p-3.5">
    <!-- 报修类型 -->
    <p class="text-[11px] font-semibold text-gray-700 mb-2">报修类型 <span class="text-red-500">*</span></p>
    <div class="grid grid-cols-4 gap-2 mb-3">
      <button class="flex flex-col items-center gap-1 py-2 rounded-lg" style="background:#FFFBEB;border:1.5px solid #F59E0B"><i class="fas fa-bolt text-primary"></i><span class="text-[10px] text-primary font-medium">电气</span></button>
      <button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-gray-50"><i class="fas fa-faucet-drip text-gray-400"></i><span class="text-[10px] text-gray-500">水管</span></button>
      <button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-gray-50"><i class="fas fa-wifi text-gray-400"></i><span class="text-[10px] text-gray-500">网络</span></button>
      <button class="flex flex-col items-center gap-1 py-2 rounded-lg bg-gray-50"><i class="fas fa-door-open text-gray-400"></i><span class="text-[10px] text-gray-500">门窗</span></button>
    </div>

    <!-- 报修位置 -->
    <p class="text-[11px] font-semibold text-gray-700 mb-2">报修位置 <span class="text-red-500">*</span></p>
    <input type="text" value="1F-A08 商铺内 照明灯故障" class="w-full text-[12px] bg-gray-50 rounded-lg px-3 py-2.5 mb-3 outline-none">

    <!-- 问题照片 -->
    <p class="text-[11px] font-semibold text-gray-700 mb-2">问题照片 <span class="text-red-500">*</span> <span class="text-gray-400 font-normal text-[10px]">至少1张</span></p>
    <div class="flex gap-2 mb-3">
      <div class="w-20 h-20 rounded-lg bg-amber-50 flex items-center justify-center relative flex-shrink-0" style="border:2px solid #F59E0B"><i class="fas fa-lightbulb text-amber-500 text-2xl"></i><span class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-white text-[9px]"><i class="fas fa-xmark"></i></span></div>
      <button class="w-20 h-20 rounded-lg border-2 border-dashed border-blue-200 flex flex-col items-center justify-center text-primary flex-shrink-0"><i class="fas fa-camera text-xl"></i><span class="text-[9px] mt-1">拍照</span></button>
    </div>

    <!-- 问题描述 -->
    <p class="text-[11px] font-semibold text-gray-700 mb-2">问题描述</p>
    <textarea placeholder="请描述故障情况…" class="w-full text-[12px] bg-gray-50 rounded-lg p-2.5 outline-none resize-none mb-3" rows="2">商铺内3盏照明灯不亮，影响正常营业，请尽快维修。</textarea>

    <!-- 紧急程度 -->
    <p class="text-[11px] font-semibold text-gray-700 mb-2">紧急程度</p>
    <div class="flex gap-2 mb-3">
      <label class="urgent-card active flex-1 flex items-center gap-2 bg-white border-2 border-transparent rounded-lg p-2.5">
        <div class="urgent-radio"></div>
        <span class="text-[11px] font-medium text-gray-800">紧急</span>
        <span class="text-[9px] text-red-500">影响营业</span>
      </label>
      <label class="urgent-card flex-1 flex items-center gap-2 bg-white border-2 border-transparent rounded-lg p-2.5">
        <div class="urgent-radio"></div>
        <span class="text-[11px] text-gray-600">一般</span>
      </label>
    </div>

    <button class="w-full py-3 rounded-xl text-white text-[13px] font-bold" style="background:linear-gradient(135deg,#F59E0B,#D97706)"><i class="fas fa-paper-plane text-[11px]"></i> 提交报修</button>
  </div>
</div>

<!-- 我的工单 -->
<div class="px-3 mt-4 mb-6">
  <div class="flex items-center justify-between mb-2">
    <p class="text-[12px] font-bold text-gray-800 px-1">我的工单</p>
    <a href="#" class="text-[10px] text-primary">全部 ›</a>
  </div>
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
    <!-- 处理中 -->
    <div class="px-3.5 py-3 border-b border-gray-50">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-[11px] text-gray-400 num">RO20260718-01</span>
        <span class="bg-amber-100 text-amber-600 text-[9px] font-bold px-1.5 py-0.5 rounded">维修中</span>
      </div>
      <p class="text-[12px] font-medium text-gray-800"><i class="fas fa-faucet-drip text-blue-400 text-[10px]"></i> 水管漏水</p>
      <div class="flex items-center gap-1 mt-1.5 text-[10px] text-gray-400">
        <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
        <span>维修师傅已到场 · 13:20</span>
      </div>
    </div>
    <!-- 已完成 -->
    <div class="px-3.5 py-3">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-[11px] text-gray-400 num">RO20260710-03</span>
        <span class="bg-emerald-100 text-emerald-600 text-[9px] font-bold px-1.5 py-0.5 rounded">已完成</span>
      </div>
      <p class="text-[12px] font-medium text-gray-800"><i class="fas fa-wifi text-gray-400 text-[10px]"></i> 网络不通</p>
      <p class="text-[10px] text-gray-400 mt-1">已修复 · 待评价 <a href="#" class="text-primary font-bold">去评价 ›</a></p>
    </div>
  </div>
</div>

</body>
</html>
