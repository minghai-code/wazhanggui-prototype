<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>缴费中心 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#F59E0B','primary-d':'#D97706','primary-l':'#FBBF24'}}}}
</script>
<style>
:root{--p:#F59E0B;--bg:#FFFBEB}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
.num{font-variant-numeric:tabular-nums}
.card{transition:transform .16s ease}
.card:active{transform:scale(.98)}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="relative px-4 pt-2 pb-5 overflow-hidden" style="background:linear-gradient(135deg,#F59E0B 0%,#D97706 50%,#B45309 100%)">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#FCD34D"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#FBBF24"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#F59E0B"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center justify-between mt-1">
    <a href="mine.html" class="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-chevron-left text-sm"></i></a>
    <h1 class="text-white font-extrabold text-[20px]" style="text-shadow:0 2px 10px rgba(0,0,0,.18)">缴费中心</h1>
    <a href="#" class="text-white text-[12px]">记录</a>
  </div>
  <p class="relative text-white/80 text-[11px] mt-2"><i class="fas fa-wallet"></i> 在线缴费 · 微信支付</p>
  <div class="relative flex gap-5 mt-3 text-[13px]">
    <a class="text-white font-bold border-b-2 border-white pb-1.5">待缴 <span class="num">1</span></a>
    <a class="text-white/70 pb-1.5">已缴</a>
    <a class="text-white/70 pb-1.5">全部</a>
  </div>
</div>

<!-- 逾期提醒 -->
<div class="px-3 mt-2">
  <div class="bg-red-50 border border-red-100 rounded-2xl p-3.5 flex items-center gap-3">
    <div class="w-11 h-11 rounded-xl flex items-center justify-center text-white flex-shrink-0" style="background:linear-gradient(135deg,#FBBF24,#F59E0B)"><i class="fas fa-circle-exclamation text-lg"></i></div>
    <div class="flex-1"><p class="text-[13px] font-bold text-red-600">您有1笔账单已逾期</p><p class="text-[10px] text-red-500 mt-0.5">逾期可能影响正常经营，请尽快缴费</p></div>
  </div>
</div>

<!-- 待缴账单 -->
<div class="px-3 mt-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">待缴账单</p>
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden" style="border-left:3px solid #EF4444">
    <div class="px-3.5 py-3.5">
      <div class="flex items-center justify-between mb-2.5">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-lg bg-red-50 flex items-center justify-center"><i class="fas fa-house text-red-500 text-sm"></i></div>
          <div><p class="text-[13px] font-bold text-gray-800">10月商铺租金</p><p class="text-[10px] text-gray-400">1F-A08 · 50㎡</p></div>
        </div>
        <span class="bg-red-100 text-red-500 text-[9px] font-bold px-1.5 py-0.5 rounded">逾期3天</span>
      </div>
      <div class="grid grid-cols-2 gap-2 bg-gray-50 rounded-lg p-2.5 text-[11px]">
        <div><span class="text-gray-400">账单金额</span><p class="text-[16px] font-extrabold text-red-500 num mt-0.5">¥12,800.00</p></div>
        <div><span class="text-gray-400">应缴日期</span><p class="text-[12px] font-semibold text-gray-700 num mt-0.5">2026-07-17</p></div>
      </div>
      <div class="flex gap-2 mt-3">
        <a href="#" class="flex-1 py-2.5 rounded-lg border border-gray-200 text-[12px] text-gray-600 text-center">账单详情</a>
        <button class="flex-[1.5] py-2.5 rounded-lg text-white text-[12px] font-bold" style="background:linear-gradient(135deg,#FBBF24,#F59E0B)"><i class="fab fa-weixin text-[11px]"></i> 立即缴费</button>
      </div>
    </div>
  </div>
</div>

<!-- 缴费记录 -->
<div class="px-3 mt-4 mb-6">
  <div class="flex items-center justify-between mb-2">
    <p class="text-[12px] font-bold text-gray-800 px-1">近期缴费记录</p>
    <a href="#" class="text-[10px] text-primary">全部 ›</a>
  </div>
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
    <div class="flex items-center gap-3 px-3.5 py-3 border-b border-gray-50">
      <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-bolt text-emerald-500 text-xs"></i></div>
      <div class="flex-1 min-w-0"><p class="text-[12px] font-medium text-gray-700">9月电费</p><p class="text-[9px] text-gray-400 num">2026-07-05 · 微信支付</p></div>
      <span class="text-[12px] font-bold text-gray-700 num">¥860.00</span>
    </div>
    <div class="flex items-center gap-3 px-3.5 py-3 border-b border-gray-50">
      <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-house text-primary text-xs"></i></div>
      <div class="flex-1 min-w-0"><p class="text-[12px] font-medium text-gray-700">9月商铺租金</p><p class="text-[9px] text-gray-400 num">2026-07-03 · 微信支付</p></div>
      <span class="text-[12px] font-bold text-gray-700 num">¥12,800.00</span>
    </div>
    <div class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-broom text-amber-500 text-xs"></i></div>
      <div class="flex-1 min-w-0"><p class="text-[12px] font-medium text-gray-700">3季度物业费</p><p class="text-[9px] text-gray-400 num">2026-07-01 · 微信支付</p></div>
      <span class="text-[12px] font-bold text-gray-700 num">¥1,500.00</span>
    </div>
  </div>
</div>

</body>
</html>
