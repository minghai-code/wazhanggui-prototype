<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>我的 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#2563EB','primary-d':'#1D4ED8','primary-l':'#3B82F6'}}}}
</script>
<style>
:root{--p:#2563EB;--bg:#F0F6FF}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
</style>
</head>
<body>

<!-- 顶部商户信息 -->
<div class="relative px-4 pt-2 pb-6 overflow-hidden">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#60A5FA"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#06B6D4"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#8B5CF6"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center gap-3 mt-2">
    <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center text-white border border-white/30">
      <i class="fas fa-shop text-2xl"></i>
    </div>
    <div class="flex-1 text-white">
      <div class="flex items-center gap-1.5">
        <p class="font-extrabold text-[17px]">大唐袜业旗舰</p>
        <span class="bg-yellow-400/90 text-yellow-900 text-[8px] font-bold px-1.5 py-0.5 rounded-full"><i class="fas fa-crown text-[7px]"></i> 信用5星</span>
      </div>
      <p class="text-white/80 text-[11px] mt-1">入驻商户 · 1F-A08 · 男袜专营</p>
      <p class="text-white/70 text-[10px] mt-0.5">经营3年 · 累计成交 2.3万单</p>
    </div>
    <a href="#" class="w-8 h-8 rounded-full bg-white/15 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-gear text-sm"></i></a>
  </div>
</div>

<!-- 经营数据小卡 -->
<div class="px-3 -mt-3 relative z-10">
  <div class="bg-white rounded-2xl shadow-soft p-3 grid grid-cols-3 text-center">
    <div><p class="text-[16px] font-extrabold text-primary num">128</p><p class="text-[10px] text-gray-400 mt-0.5">在售商品</p></div>
    <div class="border-x border-gray-100"><p class="text-[16px] font-extrabold text-cyan-600 num">486</p><p class="text-[10px] text-gray-400 mt-0.5">累计客户</p></div>
    <div><p class="text-[16px] font-extrabold text-emerald-600 num">¥186k</p><p class="text-[10px] text-gray-400 mt-0.5">本月营收</p></div>
  </div>
</div>

<!-- 功能入口 -->
<div class="px-3 mt-3">
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
    <a href="trend.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#10B981,#059669)"><i class="fas fa-chart-line text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">趋势速看</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="products.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#EC4899,#DB2777)"><i class="fas fa-box-open text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">商品管理</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="inquiry-reply.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#0EA5E9,#0284C7)"><i class="fas fa-headset text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">客户沟通</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="ai-tools.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#8B5CF6,#6366F1)"><i class="fas fa-wand-magic-sparkles text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">AI工具</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
  </div>
</div>

<!-- 市场服务 -->
<div class="px-3 mt-3">
  <div class="flex items-center gap-1.5 mb-2"><div class="w-1 h-3.5 rounded-full" style="background:#2563EB"></div><span class="text-[12px] font-bold text-gray-800">市场服务</span></div>
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
    <a href="payment.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#F59E0B,#D97706)"><i class="fas fa-wallet text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">缴费中心</span>
      <span class="bg-red-50 text-red-500 text-[10px] font-bold px-1.5 py-0.5 rounded">1项待缴</span>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="repair.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#F59E0B,#D97706)"><i class="fas fa-screwdriver-wrench text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">报修工单</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="rectify.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#EF4444,#DC2626)"><i class="fas fa-clipboard-check text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">整改任务</span>
      <span class="bg-orange-50 text-orange-500 text-[10px] font-bold px-1.5 py-0.5 rounded">1项待处理</span>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="contract.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#6366F1,#4F46E5)"><i class="fas fa-file-contract text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">合同服务</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="activity.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#F472B6,#EC4899)"><i class="fas fa-calendar-day text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">活动与培训</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="industry-service.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#0EA5E9,#0284C7)"><i class="fas fa-flask text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">产业服务申请</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
  </div>
</div>

<!-- 工厂角色（折叠） -->
<div class="px-3 mt-3 mb-28">
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden">
    <a href="capacity.html" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#14B8A6,#0D9488)"><i class="fas fa-industry text-sm"></i></div>
      <div class="flex-1"><p class="text-[13px] text-gray-800 font-medium">产能发布 / 工厂数据</p><p class="text-[10px] text-gray-400 mt-0.5">工厂角色可见</p></div>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
    <div class="h-px bg-gray-50"></div>
    <a href="#" class="flex items-center gap-3 px-3.5 py-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-gray-500" style="background:#F3F4F6"><i class="fas fa-right-from-bracket text-sm"></i></div>
      <span class="flex-1 text-[13px] text-gray-800 font-medium">退出登录</span>
      <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
    </a>
  </div>
  <p class="text-center text-[10px] text-gray-400 mt-3">袜掌柜商户版 v1.1.0 · 大唐袜业产业互联网平台</p>
</div>

<!-- 底部Tab栏 -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100" style="height:65px;z-index:100;width:393px">
  <div class="flex justify-around items-center h-full" style="padding-bottom:10px">
    <a href="home.html" class="flex flex-col items-center gap-0.5 text-gray-400"><i class="fas fa-gauge-high text-[18px]"></i><span class="text-[9px]">工作台</span></a>
    <a href="orders.html" class="flex flex-col items-center gap-0.5 text-gray-400 relative"><i class="fas fa-clipboard-list text-[18px]"></i><span class="text-[9px]">订单</span><span class="absolute top-0 right-2 bg-primary text-white text-[7px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" style="min-width:14px;height:14px">12</span></a>
    <a href="messages.html" class="flex flex-col items-center gap-0.5 text-gray-400 relative"><i class="fas fa-comment-dots text-[18px]"></i><span class="text-[9px]">消息</span><span class="absolute top-0 right-2 bg-red-500 text-white text-[7px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" style="min-width:14px;height:14px">5</span></a>
    <a href="mine.html" class="flex flex-col items-center gap-0.5" style="color:#2563EB"><i class="fas fa-user text-[18px]"></i><span class="text-[9px] font-semibold">我的</span></a>
  </div>
</div>
<div class="fixed bottom-0 left-0 right-0 flex justify-center" style="z-index:101;width:393px;pointer-events:none">
  <div style="width:134px;height:5px;background:#1A1A2E;border-radius:3px;margin-bottom:3px"></div>
</div>

</body>
</html>
