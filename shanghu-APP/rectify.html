<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>整改反馈 - 袜掌柜商户版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#EF4444','primary-d':'#DC2626','primary-l':'#F87171'}}}}
</script>
<style>
:root{--p:#EF4444;--bg:#FEF2F2}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
.shadow-soft{box-shadow:0 2px 12px rgba(20,40,80,.06)}
.grad-h{background:linear-gradient(135deg,#3B82F6 0%,#2563EB 50%,#1D4ED8 100%)}
.num{font-variant-numeric:tabular-nums}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="relative px-4 pt-2 pb-5 overflow-hidden" style="background:linear-gradient(135deg,#EF4444 0%,#DC2626 50%,#B91C1C 100%)">
  <div class="absolute -top-12 -left-10 w-44 h-44 rounded-full blur-3xl opacity-50" style="background:#FCA5A5"></div>
  <div class="absolute -top-6 right-[-30px] w-48 h-48 rounded-full blur-3xl opacity-40" style="background:#F87171"></div>
  <div class="absolute -bottom-10 left-12 w-44 h-44 rounded-full blur-3xl opacity-35" style="background:#EF4444"></div>
  <div class="relative flex justify-between items-center text-white text-sm font-semibold" style="height:40px">
    <span>9:41</span>
    <div class="flex items-center gap-1.5"><i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i></div>
  </div>
  <div class="relative flex items-center justify-between mt-1">
    <a href="mine.html" class="w-9 h-9 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-white"><i class="fas fa-chevron-left text-sm"></i></a>
    <h1 class="text-white font-extrabold text-[20px]" style="text-shadow:0 2px 10px rgba(0,0,0,.18)">整改任务</h1>
    <div class="w-9"></div>
  </div>
  <p class="relative text-white/80 text-[11px] mt-2"><i class="fas fa-clipboard-check"></i> 整改反馈 · 拍照上报</p>
  <div class="relative flex gap-5 mt-3 text-[13px]">
    <a class="text-white font-bold border-b-2 border-white pb-1.5">待整改 <span class="num">1</span></a>
    <a class="text-white/70 pb-1.5">待复核</a>
    <a class="text-white/70 pb-1.5">已完成</a>
  </div>
</div>

<!-- 整改任务详情 -->
<div class="px-3 mt-3">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1">当前整改任务</p>
  <div class="bg-white rounded-2xl shadow-soft overflow-hidden" style="border-left:3px solid #F59E0B">
    <div class="px-3.5 py-3.5">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-lg bg-orange-50 flex items-center justify-center"><i class="fas fa-clipboard-check text-orange-500 text-sm"></i></div>
          <div><p class="text-[13px] font-bold text-gray-800">商铺杂物堆放整改</p><p class="text-[10px] text-gray-400 num">RT20260717-02</p></div>
        </div>
        <span class="bg-orange-100 text-orange-500 text-[9px] font-bold px-1.5 py-0.5 rounded">待整改</span>
      </div>

      <!-- 截止提醒 -->
      <div class="bg-red-50 rounded-lg p-2.5 mb-3 flex items-center gap-2">
        <i class="fas fa-clock text-red-500 text-xs"></i>
        <p class="text-[10px] text-red-600">整改截止 <span class="font-bold num">2026-07-22</span>，剩余 <span class="font-bold num">2天</span></p>
      </div>

      <!-- 问题与要求 -->
      <div class="space-y-2.5">
        <div>
          <p class="text-[10px] font-bold text-gray-500 mb-1">巡检发现的问题</p>
          <p class="text-[11px] text-gray-700 leading-relaxed bg-gray-50 rounded-lg p-2.5">商铺门口及通道堆放纸箱货物，影响通行及消防安全，违反市场管理规定第8条。</p>
        </div>
        <div>
          <p class="text-[10px] font-bold text-gray-500 mb-1">整改要求</p>
          <p class="text-[11px] text-gray-700 leading-relaxed bg-gray-50 rounded-lg p-2.5">1. 清理商铺门口及通道堆放物<br>2. 货物按规定区域整齐摆放<br>3. 保持消防通道畅通</p>
        </div>
        <div>
          <p class="text-[10px] font-bold text-gray-500 mb-1">巡检照片</p>
          <div class="flex gap-2 mt-1">
            <div class="w-16 h-16 rounded-lg bg-orange-50 flex items-center justify-center"><i class="fas fa-boxes-stacked text-orange-400 text-xl"></i></div>
            <div class="w-16 h-16 rounded-lg bg-orange-50 flex items-center justify-center"><i class="fas fa-boxes-stacked text-orange-400 text-xl"></i></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 整改上报 -->
<div class="px-3 mt-3 mb-6">
  <p class="text-[12px] font-bold text-gray-800 mb-2 px-1"><i class="fas fa-camera text-primary text-xs"></i> 整改上报</p>
  <div class="bg-white rounded-2xl shadow-soft p-3.5">
    <p class="text-[11px] font-semibold text-gray-700 mb-2">整改后照片 <span class="text-red-500">*</span> <span class="text-gray-400 font-normal text-[10px]">至少2张</span></p>
    <div class="flex gap-2 mb-3">
      <div class="w-20 h-20 rounded-lg bg-emerald-50 flex items-center justify-center relative flex-shrink-0" style="border:2px solid #10B981"><i class="fas fa-check text-emerald-500 text-2xl"></i><span class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-white text-[9px]"><i class="fas fa-xmark"></i></span></div>
      <div class="w-20 h-20 rounded-lg bg-emerald-50 flex items-center justify-center relative flex-shrink-0" style="border:2px solid #10B981"><i class="fas fa-check text-emerald-500 text-2xl"></i><span class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-white text-[9px]"><i class="fas fa-xmark"></i></span></div>
      <button class="w-20 h-20 rounded-lg border-2 border-dashed border-blue-200 flex flex-col items-center justify-center text-primary flex-shrink-0"><i class="fas fa-camera text-xl"></i><span class="text-[9px] mt-1">拍照</span></button>
    </div>

    <p class="text-[11px] font-semibold text-gray-700 mb-2">整改说明</p>
    <textarea placeholder="说明整改情况…" class="w-full text-[12px] bg-gray-50 rounded-lg p-2.5 outline-none resize-none mb-3" rows="2">已清理门口及通道堆放物，货物已按规定区域整齐摆放，消防通道已畅通。</textarea>

    <div class="flex gap-2">
      <a href="#" class="flex-1 py-2.5 rounded-lg border border-gray-200 text-[12px] text-gray-600 text-center"><i class="fas fa-gavel text-[10px]"></i> 申诉</a>
      <button class="flex-[1.5] py-2.5 rounded-lg text-white text-[12px] font-bold" style="background:linear-gradient(135deg,#F87171,#EF4444)"><i class="fas fa-paper-plane text-[10px]"></i> 提交复核</button>
    </div>
  </div>
</div>

</body>
</html>
