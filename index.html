<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大唐袜业产业数字化综合服务平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif;
  background:#0F0F1A;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}
/* Animated background */
.bg-wrapper{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-wrapper::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#1A1A2E 0%,#16213E 40%,#0F3460 100%);
}
.bg-wrapper::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%,rgba(255,77,45,0.08) 0%,transparent 50%),
    radial-gradient(circle at 80% 70%,rgba(15,52,96,0.15) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(255,77,45,0.03) 0%,transparent 70%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;
  animation:float 20s ease-in-out infinite;
}
.bg-orb-1{width:400px;height:400px;background:#FF4D2D;top:-100px;left:-100px}
.bg-orb-2{width:350px;height:350px;background:#0F3460;bottom:-80px;right:-80px;animation-delay:-10s}
@keyframes float{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(30px,-30px)}
}

/* Main container */
.container{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:40px 24px 60px}

/* Header */
.header{text-align:center;margin-bottom:48px;animation:fadeInDown 0.8s ease}
.header .logo{
  display:inline-flex;align-items:center;gap:12px;margin-bottom:16px;
}
.header .logo-icon{
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,#FF4D2D 0%,#FF8E53 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;
  box-shadow:0 8px 32px rgba(255,77,45,0.3);
}
.header h1{
  font-size:32px;font-weight:700;
  background:linear-gradient(135deg,#fff 0%,#FF8E53 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
}
.header .subtitle{
  font-size:14px;color:rgba(255,255,255,0.5);margin-top:8px;
  letter-spacing:3px;text-transform:uppercase;
}
.header .badge{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;padding:6px 16px;
  background:rgba(255,77,45,0.1);border:1px solid rgba(255,77,45,0.3);
  border-radius:20px;font-size:12px;color:#FF8E53;
}
.header .badge i{font-size:8px;color:#FF4D2D;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Portal grid */
.portal-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  animation:fadeInUp 0.8s ease 0.2s both;
}

/* Portal card */
.portal-card{
  position:relative;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(10px);
}
.portal-card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,77,45,0.3);
  box-shadow:0 20px 40px rgba(0,0,0,0.3),0 0 0 1px rgba(255,77,45,0.1);
  background:rgba(255,255,255,0.06);
}
.portal-card .card-top{
  padding:24px 24px 16px;
  position:relative;
}
.portal-card .card-number{
  position:absolute;top:16px;right:20px;
  font-size:48px;font-weight:900;
  color:rgba(255,255,255,0.05);
  line-height:1;
}
.portal-card .card-icon{
  width:52px;height:52px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#fff;
  margin-bottom:16px;
}
.portal-card .card-title{
  font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;
}
.portal-card .card-subtitle{
  font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:12px;
  letter-spacing:1px;
}
.portal-card .card-desc{
  font-size:13px;color:rgba(255,255,255,0.55);line-height:1.7;
  padding:0 24px 20px;
}
.portal-card .card-footer{
  padding:12px 24px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.portal-card .card-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;padding:3px 10px;border-radius:10px;
}
.status-dev{background:rgba(76,175,80,0.12);color:#4CAF50;border:1px solid rgba(76,175,80,0.2)}
.status-undev{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08)}
.portal-card .card-arrow{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:rgba(255,255,255,0.4);
  transition:all 0.3s;
}
.portal-card:hover .card-arrow{
  background:rgba(255,77,45,0.15);color:#FF4D2D;
  transform:translateX(4px);
}

/* Gradient themes for icons */
.theme-1{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.theme-2{background:linear-gradient(135deg,#FF4D2D 0%,#FF8E53 100%)}
.theme-3{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%)}
.theme-4{background:linear-gradient(135deg,#7F00FF 0%,#E100FF 100%)}
.theme-5{background:linear-gradient(135deg,#00B4DB 0%,#0083B0 100%)}
.theme-6{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.theme-7{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}

/* Login Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.3s ease;
}
.modal-overlay.show{display:flex;opacity:1}
.modal-box{
  background:linear-gradient(145deg,#1e1e36 0%,#171729 100%);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px;width:400px;max-width:90vw;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
  transform:scale(0.9);transition:transform 0.3s ease;
  position:relative;
}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:none;color:rgba(255,255,255,0.5);
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.modal-close:hover{background:rgba(255,77,45,0.15);color:#FF4D2D}
.modal-header{text-align:center;margin-bottom:28px}
.modal-header .modal-icon{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,#FF4D2D 0%,#FF8E53 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:#fff;margin:0 auto 16px;
  box-shadow:0 8px 24px rgba(255,77,45,0.3);
}
.modal-header h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.modal-header p{font-size:13px;color:rgba(255,255,255,0.4)}
.modal-target{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;margin-bottom:20px;
  background:rgba(255,77,45,0.08);border:1px solid rgba(255,77,45,0.15);
  border-radius:10px;font-size:13px;color:#FF8E53;
}
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:13px;color:rgba(255,255,255,0.6);
  margin-bottom:6px;font-weight:500;
}
.form-group .input-wrap{
  position:relative;
}
.form-group .input-wrap i{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,0.3);font-size:14px;
}
.form-group input{
  width:100%;padding:12px 14px 12px 40px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;color:#fff;font-size:14px;
  transition:all 0.3s;outline:none;
}
.form-group input::placeholder{color:rgba(255,255,255,0.25)}
.form-group input:focus{
  border-color:rgba(255,77,45,0.4);
  background:rgba(255,77,45,0.04);
  box-shadow:0 0 0 3px rgba(255,77,45,0.08);
}
.form-error{
  display:none;align-items:center;gap:6px;
  padding:10px 14px;margin-bottom:16px;
  background:rgba(244,67,54,0.08);border:1px solid rgba(244,67,54,0.2);
  border-radius:8px;font-size:13px;color:#f44336;
}
.form-error.show{display:flex}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#FF4D2D 0%,#FF6B47 100%);
  border:none;border-radius:10px;color:#fff;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:all 0.3s;letter-spacing:1px;
  box-shadow:0 4px 16px rgba(255,77,45,0.3);
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,77,45,0.4)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.modal-footer{
  text-align:center;margin-top:18px;
  font-size:12px;color:rgba(255,255,255,0.3);
}

/* Undeveloped modal */
.undev-modal-box{
  background:linear-gradient(145deg,#1e1e36 0%,#171729 100%);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:40px;width:380px;max-width:90vw;text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
  transform:scale(0.9);transition:transform 0.3s ease;
}
.modal-overlay.show .undev-modal-box{transform:scale(1)}
.undev-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,193,7,0.1);
  border:2px solid rgba(255,193,7,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:#FFC107;margin:0 auto 20px;
}
.undev-modal-box h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.undev-modal-box p{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:24px}
.btn-close-undev{
  padding:10px 32px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:rgba(255,255,255,0.7);
  font-size:14px;cursor:pointer;transition:all 0.2s;
}
.btn-close-undev:hover{background:rgba(255,255,255,0.1);color:#fff}

/* Footer */
.footer{
  text-align:center;padding:32px 0 0;
  border-top:1px solid rgba(255,255,255,0.06);
  margin-top:48px;
}
.footer p{font-size:12px;color:rgba(255,255,255,0.3);line-height:1.8}
.footer p:first-child{color:rgba(255,255,255,0.45)}

/* Animations */
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Loading spinner */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function _isAuthed() {
  try {
    var t = sessionStorage.getItem(_0xa3);
    var exp = parseInt(sessionStorage.getItem(_0xa3 + '_e') || '0');
    if (!t || Date.now() > exp) return false;

function _setAuth() {

// ============================================================
// Portal click handler
// ============================================================
var currentPortal = null;

function handlePortalClick(id) {
  var portal = portals.find(function(p) { return p.id === id; });
  if (!portal) return;
  currentPortal = portal;

  // Undeveloped - show notice
  if (portal.status !== 'dev') {
    document.getElementById('undevTitle').textContent = portal.title + ' · 开发中';
    document.getElementById('undevDesc').innerHTML = '该子系统正在紧锣密鼓地开发中，暂未开放演示。<br>如需了解详情，请联系项目团队。';
    showModal('undevModal');
    return;
  }

  // Already authenticated - go directly
  if (_isAuthed()) {
    window.location.href = portal.path;
    return;
  }

  // Show login modal
  document.getElementById('loginTarget').querySelector('span').textContent = '即将进入：' + portal.title;
  document.getElementById('loginError').classList.remove('show');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  showModal('loginModal');
  setTimeout(function() { document.getElementById('loginUser').focus(); }, 300);
}

// ============================================================
// Login handler
// ============================================================
async function handleLogin() {
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value.trim();
  var btn = document.getElementById('btnLogin');
  var btnText = document.getElementById('btnLoginText');
  var errEl = document.getElementById('loginError');

  if (!user || !pass) {
    errEl.querySelector('span').textContent = '请输入账号和密码';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';
  errEl.classList.remove('show');

  try {
    var userHash = await _sha256(user);
    var passHash = await _sha256(pass);

    if (userHash === _0xa1 && passHash === _0xa2) {
      _setAuth();
      btnText.innerHTML = '<i class="fas fa-check"></i> 登录成功';
      setTimeout(function() {
        if (currentPortal && currentPortal.path) {
          window.location.href = currentPortal.path;
        }
      }, 600);
    } else {
      btn.disabled = false;
      btnText.textContent = '登 录';
      errEl.querySelector('span').textContent = '用户名或密码错误，请重试';
      errEl.classList.add('show');
    }
  } catch(e) {
    btn.disabled = false;
    btnText.textContent = '登 录';
    errEl.querySelector('span').textContent = '验证失败，请稍后重试';
    errEl.classList.add('show');
  }
}

// Enter key to submit
document.getElementById('loginPass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('loginUser').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    if (!document.getElementById('loginPass').value) {
      document.getElementById('loginPass').focus();
    } else {
      handleLogin();
    }
  }
});

// ============================================================
// Modal utilities
// ============================================================
function showModal(id) {
  document.getElementById(id).classList.add('show');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}
// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(function(m) {
  m.addEventListener('click', function(e) {
    if (e.target === m) m.classList.remove('show');
  });
});
// ESC to close
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(function(m) {
      m.classList.remove('show');
    });
  }
});
</script>
