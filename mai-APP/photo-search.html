<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>拍照找货 - 袜掌柜买家版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config={theme:{extend:{colors:{primary:'#FF4D2D','primary-d':'#E63E20','primary-l':'#FF7849'}}}}
</script>
<style>
:root{--p:#FF4D2D;--pl:#FF7849;--bg:#FFF6F3}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;margin:0;background:var(--bg);width:393px;overflow-x:hidden}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#dfdfdf;border-radius:1px}
.grad-h{background:linear-gradient(160deg,#FF4D2D 0%,#FF6B35 50%,#FF8B5A 100%)}
.shadow-soft{box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fade-up{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* 取景框扫描动画 */
.scan-line{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,#FF4D2D,transparent);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%{top:10%}50%{top:88%}100%{top:10%}}
.corner{position:absolute;width:24px;height:24px;border-color:#FF4D2D;border-style:solid;border-width:0}
.corner.tl{top:0;left:0;border-top-width:3px;border-left-width:3px;border-top-left-radius:6px}
.corner.tr{top:0;right:0;border-top-width:3px;border-right-width:3px;border-top-right-radius:6px}
.corner.bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:6px}
.corner.br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:6px}
</style>
</head>
<body>

<!-- iOS状态栏 -->
<div class="flex justify-between items-center px-6 text-white text-sm font-semibold grad-h" style="height:44px;padding-top:8px">
<span>9:41</span>
<div class="flex items-center gap-1.5">
<i class="fas fa-signal text-xs"></i><i class="fas fa-wifi text-xs"></i><span class="text-xs">75%</span><i class="fas fa-battery-three-quarters text-sm"></i>
</div>
</div>

<!-- 页面头部 -->
<div class="grad-h px-4 pb-4">
<div class="flex items-center gap-3">
<a href="home.html" class="text-white"><i class="fas fa-chevron-left text-base"></i></a>
<span class="text-white font-bold text-[17px]">拍照找货</span>
</div>
<p class="text-white/80 text-[11px] mt-2 ml-8"><i class="fas fa-wand-magic-sparkles text-[9px] mr-1"></i>AI智能识图，拍一拍快速找同款</p>
</div>

<!-- 相机取景框 -->
<div class="px-3 pt-3">
<div class="rounded-2xl overflow-hidden relative" style="background:#1A1A2E;height:280px">
<!-- 取景内容 -->
<img src="images/sock_10.jpg" class="w-full h-full object-cover opacity-90">
<!-- 遮罩 -->
<div class="absolute inset-0" style="background:rgba(26,26,46,.3)"></div>
<!-- 取景框边框 -->
<div class="absolute" style="top:20px;left:20px;right:20px;bottom:20px">
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<!-- 扫描线 -->
<div class="scan-line"></div>
</div>
<!-- 识别提示 -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 bg-black/50 backdrop-blur rounded-full px-3 py-1 flex items-center gap-1.5">
<i class="fas fa-circle-notch fa-spin text-[9px]" style="color:#FF4D2D"></i>
<span class="text-white text-[10px]">AI识别中…</span>
</div>
<!-- 闪光灯 -->
<div class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 backdrop-blur flex items-center justify-center">
<i class="fas fa-bolt text-white text-sm"></i>
</div>
</div>

<!-- 底部操作区 -->
<div class="flex items-center justify-around mt-4 px-6">
<!-- 相册 -->
<a href="photo-search.html" class="flex flex-col items-center gap-1">
<div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:#FFF0E8">
<i class="fas fa-images text-base" style="color:#FF6B35"></i>
</div>
<span class="text-[10px] text-gray-500">相册</span>
</a>
<!-- 拍照按钮 -->

<div class="w-11 h-11 rounded-full" style="background:linear-gradient(135deg,#FF4D2D,#FF7849)"></div>
</div>
<span class="text-[10px] text-gray-500">拍照</span>
</a>
<!-- 闪光灯 -->
<a href="photo-search.html" class="flex flex-col items-center gap-1">
<div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:#F3F4F6">
<i class="fas fa-bolt text-base text-gray-400"></i>
</div>
<span class="text-[10px] text-gray-500">闪光</span>
</a>
</div>
</div>

<!-- AI识图结果 -->
<div class="px-3 pt-4">
<div class="bg-white rounded-xl shadow-soft p-3 fade-up">
<div class="flex items-center gap-2 mb-2">
<div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#8B5CF6,#A78BFA)"><i class="fas fa-check text-white text-xs"></i></div>
<div>
<p class="text-[12px] font-bold text-gray-800">已识别：棉质男袜</p>
<p class="text-[10px] text-gray-400">AI置信度 96.8%</p>
</div>
</div>
<!-- 搜索建议词 -->
<div class="flex flex-wrap gap-1.5">
<a href="search.html" class="px-2.5 py-1 rounded-full text-[10px] text-gray-600" style="background:#F8F9FA">纯棉男袜</a>
<a href="search.html" class="px-2.5 py-1 rounded-full text-[10px] text-gray-600" style="background:#F8F9FA">商务袜</a>
<a href="search.html" class="px-2.5 py-1 rounded-full text-[10px] text-gray-600" style="background:#F8F9FA">防臭袜</a>
<a href="search.html" class="px-2.5 py-1 rounded-full text-[10px] text-gray-600" style="background:#F8F9FA">中筒袜</a>
<a href="search.html" class="px-2.5 py-1 rounded-full text-[10px] text-gray-600" style="background:#F8F9FA">透气袜</a>
</div>
</div>
</div>

<!-- 相似商品 -->

<div class="flex items-center justify-between mb-2.5">
<div class="flex items-center gap-1.5"><i class="fas fa-copy text-primary text-sm"></i><span class="font-bold text-[14px] text-gray-800">相似商品</span></div>
<span class="text-[11px] text-gray-400">找到 48 款</span>
</div>

<div class="grid grid-cols-2 gap-2.5">

<!-- 商品1 -->
<a href="product-detail.html" class="bg-white rounded-xl overflow-hidden shadow-soft fade-up block">
<div class="relative">

<span class="absolute top-1.5 left-1.5 text-white text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:linear-gradient(90deg,#FF4D2D,#FF7849)">98%相似</span>
</div>
<div class="p-2">

</div>

<!-- 商品2 -->
<a href="product-detail.html" class="bg-white rounded-xl overflow-hidden shadow-soft fade-up block" style="animation-delay:.05s">
<div class="relative">
<img src="images/sock_10.jpg" class="w-full h-[140px] object-cover">
<span class="absolute top-1.5 left-1.5 text-white text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:linear-gradient(90deg,#FF8B5A,#FFA070)">95%相似</span>
</div>
<div class="p-2">
<p class="text-[12px] text-gray-800 font-medium leading-tight line-clamp-2 h-8">男士精梳棉中筒袜 商务款</p>
<div class="flex items-baseline gap-1 mt-1"><span class="text-primary font-bold text-sm">¥3.2</span><span class="text-[10px] text-gray-400">/双</span></div>

</div>

<!-- 商品3 -->
<a href="product-detail.html" class="bg-white rounded-xl overflow-hidden shadow-soft fade-up block" style="animation-delay:.1s">
<div class="relative">
<img src="images/sock_11.jpg" class="w-full h-[140px] object-cover">

</div>
<div class="p-2">

<div class="flex items-center justify-between mt-0.5"><span class="text-[10px] text-gray-400">起批100双</span><span class="text-[10px] text-gray-400">已售8.7千</span></div>
</div>
</a>

<!-- 商品4 -->
<a href="product-detail.html" class="bg-white rounded-xl overflow-hidden shadow-soft fade-up block" style="animation-delay:.15s">
<div class="relative">
<img src="images/sock_02.jpg" class="w-full h-[140px] object-cover">
<span class="absolute top-1.5 left-1.5 text-white text-[9px] font-bold px-1.5 py-0.5 rounded" style="background:linear-gradient(90deg,#FFB088,#FFC4A3)">88%相似</span>
</div>
<div class="p-2">
<p class="text-[12px] text-gray-800 font-medium leading-tight line-clamp-2 h-8">网眼透气男袜 纯棉吸汗</p>

<div class="flex items-center justify-between mt-0.5"><span class="text-[10px] text-gray-400">起批300双</span><span class="text-[10px] text-gray-400">已售1.1万</span></div>
</div>
</a>

</div>

<!-- 重新拍照 -->
<a href="photo-search.html" class="flex items-center justify-center gap-1.5 mt-3 py-2.5 rounded-full bg-white shadow-soft text-[12px] font-semibold text-gray-600">
<i class="fas fa-rotate-right text-xs"></i>重新拍照识别
</a>
</div>

<!-- 底部Tab栏 4Tab -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100" style="height:65px;z-index:100;width:393px">
<div class="flex justify-around items-center h-full" style="padding-bottom:10px">

<a href="ai.html" class="flex flex-col items-center gap-0.5 text-gray-400"><i class="fas fa-robot text-[19px]"></i><span class="text-[9px]">AI工具</span></a>
<a href="purchase-order.html" class="flex flex-col items-center gap-0.5 text-gray-400 relative"><i class="fas fa-clipboard-list text-[19px]"></i><span class="text-[9px]">进货单</span><span class="absolute top-0 right-1 bg-primary text-white text-[7px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center" style="min-width:14px;height:14px">3</span></a>
<a href="mine.html" class="flex flex-col items-center gap-0.5 text-gray-400"><i class="fas fa-user text-[19px]"></i><span class="text-[9px]">我的</span></a>
</div>
</div>
<!-- Home Indicator -->
<div class="fixed bottom-0 left-0 right-0 flex justify-center" style="z-index:101;width:393px;pointer-events:none"><div style="width:134px;height:5px;background:#1A1A2E;border-radius:3px;margin-bottom:3px"></div></div>

</body>
</html>
